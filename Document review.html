<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC BR Tracker Pro</title>
    <style>
        :root { --dark: #24303c; --green: #468e5d; --blue: #3498db; --bg: #ebedef; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; overflow-x: hidden; }
        .header-top { background: var(--dark); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--green); position: sticky; top: 0; z-index: 1000; }
        .nav-btns { display: flex; gap: 10px; align-items: center; }
        .btn-nav { background: #455a64; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85em; display: flex; align-items: center; gap: 6px; }
        .clock-display { font-family: monospace; background: #000; padding: 6px 12px; border-radius: 4px; border: 1px solid #444; }
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: white; padding: 15px 25px; border-bottom: 1px solid #ccc; }
        .stat-item { border-left: 4px solid var(--green); padding-left: 15px; display: flex; flex-direction: column; align-items: center; }
        .workspace { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; padding: 15px; align-items: start; }
        .col { background: #e2e4e6; border-radius: 10px; padding: 12px; display: flex; flex-direction: column; min-height: 400px; }
        .col-header { background: #34495e; color: white; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ced4da; }
        .timer-big { font-family: monospace; font-size: 1.5em; font-weight: bold; color: var(--blue); text-align: center; display: block; background: #f0f7ff; padding: 5px; border-radius: 4px; margin: 8px 0; }
        .timer-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; background: #f8f9fa; padding: 5px; border-radius: 4px; font-size: 0.7em; text-align: center; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 350px; }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1500; padding: 20px; flex-direction: column; overflow-y: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #ddd; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; font-weight: bold; border-radius: 5px 5px 0 0; }
        .tab.active { background: var(--green); color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--green); color: white; border-radius: 50%; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 999; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .filter-group-pro { display: flex; background: #eee; border-radius: 6px; padding: 2px; }
        .btn-filter-pro { border: none; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; background: transparent; }
        .btn-filter-pro.active { background: var(--dark); color: white; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="header-top">
        <div class="nav-btns">
            <button class="btn-nav" onclick="window.location.href='index.html'">🏠 INICIO</button>
            <span style="font-weight:900;">QC BR TRACKER</span>
        </div>
       <div class="nav-btns">
    <div id="user-display" class="btn-nav" style="background:#34495e">👤...</div>
    <button class="btn-nav" style="background:#27ae60;" onclick="exportExcel()">📊 EXCEL</button>
    <button id="btn-admin-config" class="btn-nav" style="background:var(--blue); display:none;" onclick="toggleAdmin(true)">⚙️ ADMIN</button>
    <div id="reloj" class="clock-display">00:00:00</div>
</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span>BRS HOY</span><b id="top-brs" style="font-size:1.8em">0</b></div>
        <div class="stat-item"><span>PÁGINAS</span><b id="top-pags" style="font-size:1.8em">0</b></div>
        <div class="stat-item"><span>FECHA</span><input type="date" id="main-date-filter" onchange="render()" style="border:none; font-weight:bold"></div>
        <div class="stat-item">
            <div class="filter-group-pro">
                <button id="btn-todos" class="btn-filter-pro active" onclick="setShift('TODOS')">TODO</button>
                <button id="btn-ta" class="btn-filter-pro" onclick="setShift('TA')">TA</button>
                <button id="btn-tb" class="btn-filter-pro" onclick="setShift('TB')">TB</button>
            </div>
        </div>
    </div>

    <div style="padding: 10px 15px 0 15px;">
        <input type="text" id="main-search" oninput="render()" placeholder="🔍 Buscar lote..." class="search-bar">
    </div>

    <div class="workspace">
        <div class="col"><div class="col-header">ESPERA (<span id="c-wait">0</span>)</div><div id="list-wait"></div></div>
        <div class="col"><div class="col-header" style="background:var(--green)">REVISIÓN (<span id="c-run">0</span>)</div><div id="list-run"></div></div>
        <div class="col"><div class="col-header" style="background:#5d6d7e">HISTORIAL (<span id="c-done">0</span>)</div><div id="list-done"></div></div>
    </div>

    <button class="fab" onclick="showModal('modal-new')">+</button>

    <div id="modal-new" class="modal-overlay">
        <div class="modal-content">
            <h3>Registrar Lote</h3>
            <input type="text" id="new-id" placeholder="Lote #" class="modal-input">
            <select id="new-line" class="modal-input"></select>
            <button class="btn" style="background:var(--green); color:white" onclick="addBR()">GUARDAR</button>
            <button class="btn" style="background:#eee" onclick="hideModal('modal-new')">CERRAR</button>
        </div>
    </div>

    <div id="modal-finish" class="modal-overlay">
        <div class="modal-content">
            <h3>Finalizar</h3>
            <input type="number" id="finish-pg" placeholder="Total páginas" class="modal-input">
            <button class="btn" style="background:var(--green); color:white" onclick="confirmFinish()">COMPLETAR</button>
            <button class="btn" style="background:#eee" onclick="hideModal('modal-finish')">CANCELAR</button>
        </div>
    </div>

    <div id="modal-edit" class="modal-overlay">
        <div class="modal-content">
            <h3>Editar Lote</h3>
            <input type="hidden" id="edit-old-id">
            <label style="font-size: 0.7em;">NÚMERO DE LOTE</label>
            <input type="text" id="edit-id" class="modal-input">
            <label style="font-size: 0.7em;">LÍNEA</label>
            <select id="edit-line" class="modal-input"></select>
            <label style="font-size: 0.7em;">INSPECTOR</label>
            <input type="text" id="edit-user" class="modal-input">
            <label style="font-size: 0.7em;">PÁGINAS</label>
            <input type="number" id="edit-pg" class="modal-input">
            <button class="btn" style="background:var(--blue); color:white" onclick="saveEdit()">ACTUALIZAR</button>
            <button class="btn" style="background:#e74c3c; color:white; margin-top:15px" onclick="borrarLote()">ELIMINAR LOTE</button>
            <button class="btn" style="background:#eee" onclick="hideModal('modal-edit')">CANCELAR</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0;">Control Maestro</h2>
            <button onclick="toggleAdmin(false)" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">CERRAR</button>
        </div>
        <div class="tabs">
            <div id="tab-perf" class="tab active" onclick="switchTab('perf')">RENDIMIENTO</div>
            <div id="tab-edit" class="tab" onclick="switchTab('edit')">EDITOR</div>
        </div>
        <div id="view-perf">
            <input type="text" id="perf-search" oninput="renderPerf()" placeholder="🔍 Filtrar..." class="search-bar">
            <table>
                <thead><tr><th>Fecha</th><th>Fin</th><th>Lote</th><th>Línea</th><th>QC</th><th>Pgs</th><th>Tiempo</th></tr></thead>
                <tbody id="perf-body"></tbody>
            </table>
        </div>
        <div id="view-edit" style="display:none;">
            <input type="text" id="adm-search" oninput="renderAdmin()" placeholder="🔍 Buscar lote..." class="search-bar">
            <table>
                <thead><tr><th>Fecha</th><th>Lote</th><th>QC</th><th>Acción</th></tr></thead>
                <tbody id="adm-body"></tbody>
            </table>
        </div>
    </div>

<script>
let db = []; 
let userActual = "SIN ASIGNAR";
let currentShift = "TODOS";
let tempIdx = null;
const lineas = ["SOFIA 6F L1", "SOFIA 6F L2", "SOFIA 5F L2", "SOFIA 6F L3", "SOFIA EX", "SOFIA 5F", "VIA", "HW 27", "SCEPTER", "HW LONG", "HW SHORT", "REGULAR L2", "HW 21 +", "HW REGULAR"];

const firebaseConfig = {
    apiKey: "AIzaSyAKr_8VXZ6q3V6DZzzGm5UqxVKxVBJC5zI",
    authDomain: "document-review-acces.firebaseapp.com",
    projectId: "document-review-acces",
    databaseURL: "https://document-review-acces-default-rtdb.firebaseio.com" 
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

function showModal(id) { document.getElementById(id).style.display = 'flex'; }
function hideModal(id) { document.getElementById(id).style.display = 'none'; }

function iniciarSincronizacion() {
    rtdb.ref('recursos').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const arrayNube = Object.values(data);
            const mapaFinal = new Map();
            arrayNube.forEach(l => mapaFinal.set(l.id.toString(), l));
            db.forEach(lLocal => {
                if (Date.now() - (lLocal.lastUpdate || 0) < 5000) mapaFinal.set(lLocal.id.toString(), lLocal);
            });
            db = Array.from(mapaFinal.values());
            db.sort((a, b) => a.id.toString().localeCompare(b.id.toString(), undefined, { numeric: true }));
        }
        render(); 
    });
}
function obtenerTurnoActual() {
    const ahora = new Date();
    const hora = ahora.getHours();
    const minutos = ahora.getMinutes();
    const horaDecimal = hora + (minutos / 60);

    // TA: 6:00 AM (6.0) a 3:30 PM (15.5)
    if (horaDecimal >= 6 && horaDecimal <= 15.5) {
        return "TA";
    } 
    // TB: 3:31 PM (15.51) a 12:00 MD (24.0 o 0.0)
    else {
        return "TB";
    }
}
async function addBR() {
    const id = document.getElementById('new-id').value.trim();
    const line = document.getElementById('new-line').value;
    
    if (!id) return alert("Falta Lote");

    // 1. OBTENER FECHA LOCAL REAL (HOY)
    const ahora = new Date();
    const offset = ahora.getTimezoneOffset() * 60000; 
    const hoyReal = new Date(ahora - offset).toISOString().split('T')[0];

    // 2. VALIDACIÓN DE FECHA SELECCIONADA
    const fechaFiltro = document.getElementById('main-date-filter').value;
    
    if (fechaFiltro !== hoyReal) {
        return alert(`⚠️ BLOQUEO: Estás intentando ingresar un lote en una fecha que no es hoy (${hoyReal}). \n\nPor favor, ajusta el calendario a la fecha actual antes de registrar.`);
    }

    // 3. OBTENER TURNO AUTOMÁTICO
    const turnoDetectado = obtenerTurnoActual();

    const nuevo = {
        id, 
        line, 
        user: "POR ASIGNAR", 
        st: "wait",
        date: hoyReal, // Siempre guardamos la fecha real de hoy
        shift: turnoDetectado,
        tW: 0, tR: 0, tC: 0, tR_acumulado: 0, tC_acumulado: 0,
        inicioWS: Date.now(), 
        lastUpdate: Date.now()
    };

    await rtdb.ref('recursos/' + id).set(nuevo);
    document.getElementById('new-id').value = "";
    hideModal('modal-new');
}
async function changeSt(id, s) {
    const ahora = Date.now();
    const lote = db.find(l => l.id == id);
    if (!lote) return;

    // VALIDACIÓN: Solo permitir cambios si el lote es del día de hoy
    const hoy = new Date();
    const offset = hoy.getTimezoneOffset() * 60000; 
    const hoyReal = new Date(hoy - offset).toISOString().split('T')[0];

    if (lote.date !== hoyReal) {
        return alert("⚠️ ACCESO DENEGADO: Solo puedes modificar lotes que pertenezcan a la fecha de hoy.");
    }

    // ASIGNACIÓN DE USUARIO SOLO AL INICIAR
    if (lote.st === 'wait' && s === 'rev') lote.user = userActual;

    // ACUMULAR TIEMPOS
    if (lote.st === 'rev' && lote.inicioRS) lote.tR_acumulado = (ahora - lote.inicioRS) + (Number(lote.tR_acumulado) || 0);
    if (lote.st === 'corr' && lote.inicioCS) lote.tC_acumulado = (ahora - lote.inicioCS) + (Number(lote.tC_acumulado) || 0);

    lote.st = s;
    lote.lastUpdate = ahora;

    if (s === 'rev') { lote.inicioRS = ahora; lote.inicioCS = null; }
    else if (s === 'corr') { lote.inicioCS = ahora; lote.inicioRS = null; }
    
    await rtdb.ref('recursos/' + id).update(lote);
}
function openFin(id) { tempIdx = id; document.getElementById('finish-pg').value = ""; showModal('modal-finish'); }

async function confirmFinish() {
    const p = document.getElementById('finish-pg').value;
    if (!p || p <= 0) return alert("Páginas inválidas");
    const lote = db.find(l => l.id == tempIdx);
    const ahoraMs = Date.now();
    lote.pg = parseInt(p);
    if (lote.st === 'rev') lote.tR_acumulado = (ahoraMs - lote.inicioRS) + (Number(lote.tR_acumulado) || 0);
    if (lote.st === 'corr') lote.tC_acumulado = (ahoraMs - lote.inicioCS) + (Number(lote.tC_acumulado) || 0);
    lote.st = 'done';
    lote.hFin = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    lote.lastUpdate = ahoraMs;
    await rtdb.ref('recursos/' + tempIdx).update(lote);
    hideModal('modal-finish');
}

// FUNCIONES DE EDICIÓN ADMIN
function openEdit(id) {
    const l = db.find(x => x.id == id);
    if(!l) return;
    document.getElementById('edit-old-id').value = l.id;
    document.getElementById('edit-id').value = l.id;
    document.getElementById('edit-line').value = l.line;
    document.getElementById('edit-user').value = l.user;
    document.getElementById('edit-pg').value = l.pg || 0;
    showModal('modal-edit');
}

async function saveEdit() {
    const oldId = document.getElementById('edit-old-id').value;
    const newId = document.getElementById('edit-id').value;
    const l = db.find(x => x.id == oldId);
    
    l.id = newId;
    l.line = document.getElementById('edit-line').value;
    l.user = document.getElementById('edit-user').value;
    l.pg = parseInt(document.getElementById('edit-pg').value);
    l.lastUpdate = Date.now();

    if (oldId !== newId) {
        await rtdb.ref('recursos/' + oldId).remove();
    }
    await rtdb.ref('recursos/' + newId).set(l);
    hideModal('modal-edit');
}

async function borrarLote() {
    const id = document.getElementById('edit-old-id').value;
    if(confirm("¿Eliminar este lote permanentemente?")) {
        await rtdb.ref('recursos/' + id).remove();
        hideModal('modal-edit');
    }
}

function fmt(ms) {
    if (!ms || ms < 0) return "00:00";
    let s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
    return (h > 0 ? h+":" : "") + (m%60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0');
}

function render() {
    const lists = { wait: document.getElementById('list-wait'), run: document.getElementById('list-run'), done: document.getElementById('list-done') };
    const counts = { wait: 0, run: 0, done: 0 };
    Object.values(lists).forEach(l => l.innerHTML = "");
    
    const selDate = document.getElementById('main-date-filter').value;
    const search = document.getElementById('main-search').value.toLowerCase();
    
    // Inicializamos totales para el recálculo
    let topB = 0, topP = 0;

    db.forEach(l => {
        // 1. Filtro por búsqueda (Lote #)
        if (search && !l.id.toString().toLowerCase().includes(search)) return;
        
        const isDone = (l.st === 'done');
        
        // 2. Filtro por Fecha (Solo aplica a los FINALIZADOS)
        if (isDone && selDate && l.date !== selDate) return;

        // 3. Filtro por Turno (TA / TB / TODOS)
        // Si el turno del lote no coincide con el seleccionado (y no es 'TODOS'), saltamos
        if (currentShift !== "TODOS" && l.shift !== currentShift) return;

        // --- Sumar a los contadores de arriba solo si pasó los filtros ---
        if (isDone) {
            topB++; 
            topP += (Number(l.pg) || 0);
        }

        // --- Construcción de la tarjeta ---
        const card = `
        <div class="card" style="border-left: 5px solid ${isDone ? '#468e5d' : (l.st === 'wait' ? '#2c3e50' : '#f39c12')};">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; font-size:1.1em">${l.id}</span>
                <span style="font-size:0.65em; background:#eee; padding:2px 6px; border-radius:4px; font-weight:bold; color:#555;">${l.shift || 'S/T'}</span>
            </div>
            <div style="font-size:0.75em; color:#666; margin-bottom:5px;">${l.line} | <b>${l.user}</b></div>
            
            ${isDone ? 
                `<div style="text-align:center; color:var(--green); font-weight:bold; margin:10px 0; border:1px dashed var(--green); border-radius:4px; padding:5px;">FINALIZADO</div>` : 
                `<span class="timer-big" id="live-${l.id}">00:00</span>`
            }
            
            <div class="timer-grid-3">
                <div>W: ${fmt(l.tW)}</div>
                <div>R: ${fmt(l.tR)}</div>
                <div>C: ${fmt(l.tC)}</div>
            </div>

            ${l.st === 'wait' ? 
                `<button class="btn" style="background:#27ae60; color:white" onclick="changeSt('${l.id}','rev')">INICIAR REVISIÓN</button>` : 
                (l.st==='rev' || l.st==='corr') ? `
                    <button class="btn" style="background:#f39c12; color:white" onclick="changeSt('${l.id}','corr')">CORRECCIÓN</button>
                    <button class="btn" style="background:#2c3e50; color:white" onclick="openFin('${l.id}')">FINALIZAR</button>` : 
                `<div style="text-align:center; font-weight:bold; color:var(--dark); margin-top:5px">PÁGS: ${l.pg}</div>`
            }
        </div>`;
        
        // Enviamos la tarjeta a la lista correspondiente
        lists[isDone ? 'done' : (l.st==='wait' ? 'wait' : 'run')].insertAdjacentHTML('afterbegin', card);
        counts[isDone ? 'done' : (l.st==='wait' ? 'wait' : 'run')]++;
    });

    // Actualizamos elementos de la interfaz
    document.getElementById('top-brs').innerText = topB;
    document.getElementById('top-pags').innerText = topP;
    document.getElementById('c-wait').innerText = counts.wait;
    document.getElementById('c-run').innerText = counts.run;
    document.getElementById('c-done').innerText = counts.done;
}
ffunction tick() {
    const ahora = Date.now();
    db.forEach(l => {
        if (l.st === 'done') return;
        
        // Cálculo de tiempos internos
        if (l.st === 'wait') l.tW = ahora - l.inicioWS;
        if (l.st === 'rev') l.tR = (ahora - l.inicioRS) + (Number(l.tR_acumulado) || 0);
        if (l.st === 'corr') l.tC = (ahora - l.inicioCS) + (Number(l.tC_acumulado) || 0);
        
        // Actualización visual del cronómetro grande
        const el = document.getElementById(`live-${l.id}`);
        if (el) {
            // Esta es la línea clave: añadimos l.st === 'corr'
            let tiempoAMostrar = 0;
            if (l.st === 'wait') tiempoAMostrar = l.tW;
            else if (l.st === 'rev') tiempoAMostrar = l.tR;
            else if (l.st === 'corr') tiempoAMostrar = l.tC;
            
            el.innerText = fmt(tiempoAMostrar);
        }
    });
    document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
}

function toggleAdmin(v) { document.getElementById('admin-panel').style.display = v ? 'flex' : 'none'; if(v) renderPerf(); }
function switchTab(t) {
    document.getElementById('view-perf').style.display = t==='perf'?'block':'none';
    document.getElementById('view-edit').style.display = t==='edit'?'block':'none';
    document.getElementById('tab-perf').className = 'tab' + (t==='perf'?' active':'');
    document.getElementById('tab-edit').className = 'tab' + (t==='edit'?' active':'');
    t==='edit' ? renderAdmin() : renderPerf();
}

function renderPerf() {
    const b = document.getElementById('perf-body'); b.innerHTML = "";
    const s = document.getElementById('perf-search').value.toLowerCase();
    db.filter(l => l.st === 'done').forEach(l => {
        if (s && !l.id.toString().includes(s)) return;
        b.innerHTML += `<tr><td>${l.date}</td><td>${l.hFin}</td><td>${l.id}</td><td>${l.line}</td><td>${l.user}</td><td>${l.pg}</td><td>${fmt(l.tR)}</td></tr>`;
    });
}

function renderAdmin() {
    const b = document.getElementById('adm-body'); b.innerHTML = "";
    const s = document.getElementById('adm-search').value.toLowerCase();
    db.forEach(l => {
        if (s && !l.id.toString().includes(s)) return;
        b.innerHTML += `<tr><td>${l.date}</td><td>${l.id}</td><td>${l.user}</td><td><button onclick="openEdit('${l.id}')">EDITAR ✏️</button></td></tr>`;
    });
}
function exportExcel() {
    const selDate = document.getElementById('main-date-filter').value;
    
    // 1. Filtramos los datos igual que en el render
    const datosFiltrados = db.filter(l => {
        const coincideFecha = l.st === 'done' ? (l.date === selDate) : true;
        const coincideTurno = currentShift === "TODOS" || l.shift === currentShift;
        return coincideFecha && coincideTurno;
    }).map(l => ({
        "FECHA": l.date,
        "LOTE": l.id,
        "LINEA": l.line,
        "TURNO": l.shift || "N/A",
        "INSPECTOR": l.user,
        "ESTADO": l.st.toUpperCase(),
        "PAGINAS": l.pg || 0,
        "HORA FIN": l.hFin || "---",
        "TIEMPO REV (Min)": (l.tR / 60000).toFixed(2),
        "TIEMPO CORR (Min)": (l.tC / 60000).toFixed(2)
    }));

    if (datosFiltrados.length === 0) return alert("No hay datos para exportar con los filtros actuales.");

    // 2. Crear el libro de Excel
    const hoja = XLSX.utils.json_to_sheet(datosFiltrados);
    const libro = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(libro, hoja, "Reporte QC");

    // 3. Descargar
    const nombreArchivo = `Reporte_QC_${selDate}_${currentShift}.xlsx`;
    XLSX.writeFile(libro, nombreArchivo);
}
function setShift(t) {
    currentShift = t; // 'TA', 'TB' o 'TODOS'
    
    // 1. Quitamos la clase 'active' de todos los botones de turno
    document.querySelectorAll('.btn-filter-pro').forEach(b => {
        b.classList.remove('active');
    });

    // 2. Aplicamos 'active' al botón correspondiente
    // Esto asume que tus IDs son: btn-todos, btn-ta, btn-tb
    const idBoton = 'btn-' + t.toLowerCase();
    const boton = document.getElementById(idBoton);
    
    if (boton) {
        boton.classList.add('active');
    }

    // 3. Ejecutamos el render para que los contadores y la lista se actualicen
    render();
}
window.onload = () => {
    const s = localStorage.getItem('qc_session');
    if (s) {
        const u = JSON.parse(s);
        userActual = u.nombre.toUpperCase();
        if (u.isAdmin) document.getElementById('btn-admin-config').style.display = 'block';
    }
    document.getElementById('user-display').innerText = "👤 " + userActual;

    const sel = document.getElementById('new-line');
    const selEdit = document.getElementById('edit-line');
    lineas.sort().forEach(l => {
        sel.innerHTML += `<option value="${l}">${l}</option>`;
        selEdit.innerHTML += `<option value="${l}">${l}</option>`;
    });

    // --- CORRECCIÓN DE FECHA LOCAL ---
    const hoy = new Date();
    const offset = hoy.getTimezoneOffset() * 60000; // Ajuste en milisegundos
    const fechaLocal = new Date(hoy - offset).toISOString().split('T')[0];
    
    document.getElementById('main-date-filter').value = fechaLocal;
    // ---------------------------------

    iniciarSincronizacion();
    setInterval(tick, 1000);
};
</script>
